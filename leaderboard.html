<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE PAUL CUP 2026 — Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#D4A843;--gold-lt:#F0D078;--gold-dk:#9A7B2E;--bg:#09090D;--card:#131319;--card-h:#19191F;--bdr:#22222E;--tx:#FFFFFF;--tx2:#7A7A8E;--silver:#A8A8B8;--bronze:#CD7F32}
        html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;min-height:100vh}

        /* ── Intro ── */
        #intro{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1;transform:scale(1);transition:opacity .8s ease,transform .8s ease}
        #intro.out{opacity:0;transform:scale(1.06);pointer-events:none}
        .intro-particles{position:absolute;inset:0;overflow:hidden}
        .ptc{position:absolute;border-radius:50%;background:var(--gold);opacity:0;animation:ptcUp var(--d) var(--dl) infinite}
        @keyframes ptcUp{0%{opacity:0;transform:translateY(0) scale(0)}15%{opacity:.45}85%{opacity:.15}100%{opacity:0;transform:translateY(-105vh) scale(1.2)}}
        .intro-logo-wrap{position:relative;width:170px;height:170px;display:flex;align-items:center;justify-content:center}
        .intro-logo-circle{position:absolute;inset:0;border-radius:50%;background:#fff;opacity:0;transform:scale(0);animation:circIn 1.4s .3s cubic-bezier(.16,1,.3,1) forwards;box-shadow:0 0 60px rgba(255,255,255,.12),0 0 120px rgba(212,168,67,.15)}
        @keyframes circIn{to{opacity:1;transform:scale(1)}}
        .intro-logo-ring{position:absolute;inset:-14px;border:1px solid rgba(212,168,67,0);border-radius:50%;animation:ringIn 1.4s .7s cubic-bezier(.16,1,.3,1) forwards}
        @keyframes ringIn{from{transform:scale(.4);opacity:0}to{border-color:rgba(212,168,67,.2);opacity:1}}
        .intro-logo{position:relative;z-index:2;width:130px;height:130px;object-fit:contain;opacity:0;transform:scale(.2) rotate(-15deg);filter:drop-shadow(0 0 0 rgba(0,0,0,0));animation:logoIn 1.6s .5s cubic-bezier(.16,1,.3,1) forwards}
        @keyframes logoIn{0%{opacity:0;transform:scale(.2) rotate(-15deg)}50%{opacity:1;transform:scale(1.04) rotate(1deg);filter:drop-shadow(0 2px 8px rgba(0,0,0,.25))}100%{opacity:1;transform:scale(1) rotate(0);filter:drop-shadow(0 2px 8px rgba(0,0,0,.25))}}
        .intro-title{font-family:'Oswald',sans-serif;font-size:clamp(2.2rem,8vw,4.5rem);font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:1.8rem;display:flex;gap:.25em;overflow:hidden}
        .intro-title .w{display:inline-block;opacity:0;transform:translateY(110%);animation:wUp .8s cubic-bezier(.16,1,.3,1) forwards}
        .intro-title .w:nth-child(1){animation-delay:1.8s}.intro-title .w:nth-child(2){animation-delay:1.92s}.intro-title .w:nth-child(3){animation-delay:2.04s}
        @keyframes wUp{to{opacity:1;transform:translateY(0)}}
        .intro-year{font-family:'Oswald',sans-serif;font-size:clamp(1.2rem,4vw,2.8rem);font-weight:300;letter-spacing:.6em;color:var(--tx);margin-top:.35rem;opacity:0;transform:scale(.4);animation:yrIn .65s 2.6s cubic-bezier(.16,1,.3,1) forwards}
        @keyframes yrIn{to{opacity:1;transform:scale(1)}}
        .intro-line{width:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-top:1.4rem;animation:lineDr .8s 3s ease forwards}
        @keyframes lineDr{to{width:min(300px,65vw)}}
        .intro-sub{font-size:.78rem;font-weight:600;letter-spacing:.45em;text-transform:uppercase;color:var(--tx2);margin-top:1.1rem;opacity:0;animation:fadeI .5s 3.5s ease forwards}
        @keyframes fadeI{to{opacity:1}}
        .intro-sport-row{display:flex;gap:1.8rem;margin-top:1.3rem;opacity:0;animation:fadeI .5s 3.8s ease forwards}
        .intro-sport-item{display:flex;align-items:center;gap:.45rem;font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2)}
        .intro-sport-item i{color:var(--gold);font-size:.8rem}
        #skipBtn{position:absolute;bottom:1.5rem;right:1.5rem;background:transparent;border:1px solid rgba(212,168,67,.22);color:var(--gold);padding:.45rem 1rem;font-family:'Inter',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border-radius:4px;opacity:0;animation:fadeI .3s .6s ease forwards;transition:all .25s ease;z-index:10}
        #skipBtn:hover{background:rgba(212,168,67,.1);border-color:var(--gold)}

        /* ── App ── */
        #app{opacity:0;transition:opacity .7s .15s ease;min-height:100vh}#app.show{opacity:1}
        .ambient{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden}
        .amb-g{position:absolute;width:500px;height:500px;border-radius:50%;filter:blur(140px);opacity:.025;background:var(--gold)}
        .amb-g.a{top:-200px;right:-150px;animation:ambF 20s ease-in-out infinite}.amb-g.b{bottom:-200px;left:-150px;animation:ambF 26s ease-in-out infinite reverse}
        @keyframes ambF{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-35px)}}

        /* ── Header ── */
        .hdr{position:sticky;top:0;z-index:100;background:rgba(9,9,13,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:.6rem 1rem}
        .hdr-in{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:.8rem}
        .hdr-l{display:flex;align-items:center;gap:.7rem;min-width:0}
        .hdr-logo{width:36px;height:36px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 0 5px rgba(212,168,67,.25))}
        .hdr-t{font-family:'Oswald',sans-serif;font-size:clamp(.85rem,3.2vw,1.3rem);font-weight:600;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .hdr-t em{font-style:normal;color:var(--gold)}
        .hdr-r{display:flex;align-items:center;gap:1rem;flex-shrink:0}
        .hdr-link{font-size:.65rem;color:var(--tx2);text-decoration:none;letter-spacing:.05em;transition:color .25s}.hdr-link:hover{color:var(--gold)}
        .hdr-clock{font-family:'Oswald',sans-serif;font-size:.85rem;color:var(--tx2);letter-spacing:.05em}

        /* ── Tabs ── */
        .tabs-wrap{max-width:900px;margin:0 auto;padding:1rem 1rem 0}
        .s-tabs{display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto;-webkit-overflow-scrolling:touch}.s-tabs::-webkit-scrollbar{display:none}
        .s-tab{font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:.65rem 1.4rem;background:none;border:none;color:var(--tx2);cursor:pointer;position:relative;transition:color .25s;white-space:nowrap;flex-shrink:0}
        .s-tab:hover{color:var(--tx)}.s-tab.on{color:var(--gold)}
        .s-tab.on::after{content:'';position:absolute;bottom:-1px;left:0;width:100%;height:2px;background:var(--gold)}
        .s-tab i{margin-right:.4rem;font-size:.8rem}
        .a-tabs{display:flex;gap:.4rem;margin-top:.8rem;justify-content:center;flex-wrap:wrap}
        .a-tab{font-family:'Inter',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:.4rem .9rem;background:var(--card);border:1px solid var(--bdr);color:var(--tx2);cursor:pointer;border-radius:5px;transition:all .25s}
        .a-tab:hover{border-color:var(--gold-dk);color:var(--tx)}.a-tab.on{background:rgba(212,168,67,.07);border-color:var(--gold);color:var(--gold)}
        .stats-row{display:flex;gap:1rem;margin-top:.8rem;justify-content:center;flex-wrap:wrap}
        .st-i{display:flex;align-items:center;gap:.35rem;font-size:.68rem;color:var(--tx2)}
        .st-c{font-weight:700;color:var(--tx)}

        /* ── Leaderboard ── */
        .lb-wrap{max-width:680px;margin:0 auto;padding:.8rem 1rem 2rem}
        .lb-list{display:flex;flex-direction:column;gap:.55rem}

        .lb-row{display:flex;align-items:center;gap:.7rem;padding:.75rem .9rem;background:var(--card);border:1px solid var(--bdr);border-radius:10px;position:relative;overflow:hidden;opacity:0;transform:translateY(15px);transition:background .3s,border-color .3s}
        .lb-row:hover{background:var(--card-h);border-color:#2a2a38}
        .lb-row.rank-1{border-color:rgba(212,168,67,.25);background:linear-gradient(135deg,rgba(212,168,67,.06),var(--card))}
        .lb-row.rank-2{border-color:rgba(168,168,184,.15)}
        .lb-row.rank-3{border-color:rgba(205,127,50,.15)}
        .lb-row.rank-1::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold)}
        .lb-row.rank-2::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--silver)}
        .lb-row.rank-3::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--bronze)}

        .lb-rank{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:700;flex-shrink:0;border:2px solid var(--bdr);color:var(--tx2);background:var(--bg);transition:all .4s}
        .rank-1 .lb-rank{border-color:var(--gold);background:rgba(212,168,67,.12);color:var(--gold);box-shadow:0 0 12px rgba(212,168,67,.15)}
        .rank-2 .lb-rank{border-color:var(--silver);background:rgba(168,168,184,.08);color:var(--silver)}
        .rank-3 .lb-rank{border-color:var(--bronze);background:rgba(205,127,50,.08);color:var(--bronze)}

        .lb-team{flex:1;display:flex;align-items:center;gap:.6rem;min-width:0}
        .lb-badge{width:34px;height:34px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:.65rem;font-weight:600;color:#fff;letter-spacing:.02em}
        .lb-name{font-size:.82rem;font-weight:600;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        .lb-score-area{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
        .lb-bar-wrap{width:60px;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;flex-shrink:0}
        .lb-bar{height:100%;border-radius:3px;background:var(--gold-dk);transition:width .6s cubic-bezier(.16,1,.3,1);min-width:0}
        .rank-1 .lb-bar{background:linear-gradient(90deg,var(--gold-dk),var(--gold))}
        .rank-2 .lb-bar{background:var(--silver)}
        .rank-3 .lb-bar{background:var(--bronze)}
        .lb-score{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;min-width:2.2rem;text-align:right;transition:all .4s}
        .rank-1 .lb-score{color:var(--gold);font-size:1.6rem}
        .rank-2 .lb-score{color:var(--silver)}
        .rank-3 .lb-score{color:var(--bronze)}
        .lb-score.flash{animation:sFlash .5s ease}
        @keyframes sFlash{0%{transform:scale(1)}30%{transform:scale(1.35);color:var(--gold-lt)}100%{transform:scale(1)}}

        /* Skeleton */
        .skel-row{display:flex;align-items:center;gap:.7rem;padding:.75rem .9rem;background:var(--card);border:1px solid var(--bdr);border-radius:10px}
        .skel-c{width:36px;height:36px;border-radius:50%;background:var(--bdr);flex-shrink:0;animation:skP 1.2s ease infinite}
        .skel-sq{width:34px;height:34px;border-radius:7px;background:var(--bdr);flex-shrink:0;animation:skP 1.2s ease infinite}
        .skel-bar{height:12px;border-radius:4px;background:var(--bdr);animation:skP 1.2s ease infinite}
        .skel-sc{width:50px;height:24px;border-radius:4px;background:var(--bdr);animation:skP 1.2s ease infinite}
        @keyframes skP{0%,100%{opacity:.4}50%{opacity:.8}}

        /* Empty */
        .lb-empty{text-align:center;padding:4rem 1rem;color:var(--tx2)}
        .lb-empty i{font-size:2.5rem;color:var(--bdr);margin-bottom:1rem;display:block}
        .lb-empty p{font-size:.85rem;line-height:1.6}

        /* Footer */
        .ftr{text-align:center;padding:1.5rem 1rem;border-top:1px solid var(--bdr);margin-top:1rem}
        .ftr p{font-size:.65rem;color:var(--tx2);letter-spacing:.03em;line-height:1.7}
        .ftr a{color:var(--gold);text-decoration:none}

        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:var(--gold-dk)}
        @media(max-width:480px){.lb-bar-wrap{display:none}.lb-score{font-size:1.2rem}.rank-1 .lb-score{font-size:1.35rem}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

<div id="intro">
    <div class="intro-particles" id="particles"></div>
    <div class="intro-logo-wrap">
        <div class="intro-logo-circle"></div>
        <div class="intro-logo-ring"></div>
        <img src="./images/logo.png" alt="De Paul School" class="intro-logo">
    </div>
    <div class="intro-title"><span class="w">DE</span><span class="w">PAUL</span><span class="w">CUP</span></div>
    <div class="intro-year">2026</div>
    <div class="intro-line"></div>
    <div class="intro-sub">Leaderboard</div>
    <div class="intro-sport-row">
        <div class="intro-sport-item"><i class="fas fa-futbol"></i> Football</div>
        <div class="intro-sport-item"><i class="fas fa-basketball"></i> Basketball</div>
    </div>
    <button id="skipBtn">SKIP <i class="fas fa-arrow-right" style="margin-left:.35rem;font-size:.55rem"></i></button>
</div>

<div id="app">
    <div class="ambient"><div class="amb-g a"></div><div class="amb-g b"></div></div>
    <header class="hdr">
        <div class="hdr-in">
            <div class="hdr-l">
                <img src="./images/logo.png" alt="Logo" class="hdr-logo">
                <div class="hdr-t"><em>De Paul</em> Cup — Leaderboard</div>
            </div>
            <div class="hdr-r">
                <a href="index.html" class="hdr-link"><i class="fas fa-tv" style="margin-right:.3rem"></i>Live</a>
                <div class="hdr-clock" id="clock">--:--</div>
            </div>
        </div>
    </header>
    <div class="tabs-wrap">
        <div class="s-tabs" id="sportTabs">
            <button class="s-tab on" data-sport="football"><i class="fas fa-futbol"></i>Football</button>
            <button class="s-tab" data-sport="basketball"><i class="fas fa-basketball"></i>Basketball</button>
        </div>
        <div class="a-tabs" id="ageTabs">
            <button class="a-tab on" data-age="u16">Under 16</button>
            <button class="a-tab" data-age="u18">Under 18</button>
        </div>
        <div class="stats-row" id="statsRow"></div>
    </div>
    <div class="lb-wrap"><div class="lb-list" id="lbList"></div></div>
    <footer class="ftr">
        <p>DE PAUL CUP 2026 — Inter-School Sports Tournament<br>
        Organised by De Paul School &bull; Football & Basketball<br>
        &copy; 2026 All Rights Reserved</p>
    </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
/* Particles */
(function(){var c=document.getElementById('particles');for(var i=0;i<25;i++){var p=document.createElement('div');p.className='ptc';p.style.left=Math.random()*100+'%';p.style.top=(55+Math.random()*45)+'%';p.style.setProperty('--d',(5+Math.random()*5)+'s');p.style.setProperty('--dl',(Math.random()*4)+'s');var s=1.5+Math.random()*2;p.style.width=s+'px';p.style.height=s+'px';c.appendChild(p)}})();

/* Helpers */
function tColor(n){var h=0;for(var i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return'hsl('+(((h%360)+360)%360)+',45%,30%)'}
function tAbbr(n){var a=n.replace(/^(St\.?|Holy|SHSS|GHSS|MHSS|HSS|School|')/g,'').trim().split(/\s+/).map(function(w){return w[0]}).join('').substring(0,3).toUpperCase();return a||'TM'}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* Firebase */
var firebaseConfig={apiKey:"AIzaSyBpNOpvViUBo1mB0MaMk2shSOMdVGCxG5w",authDomain:"dpcup-fbbb5.firebaseapp.com",databaseURL:"https://dpcup-fbbb5-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"dpcup-fbbb5",storageBucket:"dpcup-fbbb5.firebasestorage.app",messagingSenderId:"338538335205",appId:"1:338538335205:web:800a88022a4a010809fd0c"};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();

/* State */
var curSport='football',curAge='u16';
var teamsData={};
var prevScoreMap={};
var hasEverRendered=false;
var listenerRef=null;

/* Setup listener — always active, re-attach on tab change */
function attachListener(){
    if(listenerRef) listenerRef.off();
    var path='leaderboard/'+curSport+'/'+curAge;
    listenerRef=db.ref(path);
    listenerRef.on('value',function(snapshot){
        teamsData=snapshot.val()||{};
        renderLeaderboard(hasEverRendered);
        hasEverRendered=true;
    });
}
attachListener();

/* Sort teams by score desc, then name asc */
function getSorted(){
    var arr=[];
    for(var k in teamsData){
        var t=teamsData[k];
        arr.push({_id:k,name:t.name||'Unknown',score:parseInt(t.score)||0,updatedAt:t.updatedAt||0});
    }
    arr.sort(function(a,b){
        if(b.score!==a.score) return b.score-a.score;
        return (a.name||'').localeCompare(b.name||'');
    });
    return arr;
}

/* Render */
function renderLeaderboard(animate){
    var list=document.getElementById('lbList');
    var sorted=getSorted();
    var maxScore=0;
    for(var i=0;i<sorted.length;i++){if(sorted[i].score>maxScore)maxScore=sorted[i].score}
    maxScore=Math.max(maxScore,1);

    /* Stats */
    document.getElementById('statsRow').innerHTML='<div class="st-i">Teams <span class="st-c">'+sorted.length+'</span></div>';

    if(sorted.length===0){
        list.innerHTML='<div class="lb-empty"><i class="fas fa-trophy"></i><p>No teams in this category yet.<br>Standings will appear here once added.</p></div>';
        return;
    }

    /* FLIP: record old positions */
    var oldRects={};
    if(animate){
        var oldRows=list.querySelectorAll('.lb-row');
        for(var i=0;i<oldRows.length;i++){
            oldRects[oldRows[i].dataset.id]=oldRows[i].getBoundingClientRect();
        }
    }

    /* Build HTML */
    var html='';
    for(var i=0;i<sorted.length;i++){
        var t=sorted[i];
        var rank=i+1;
        var rClass=rank<=3?'rank-'+rank:'';
        var barW=Math.round((t.score/maxScore)*100);
        var prevS=prevScoreMap[t._id];
        var flashClass=(prevS!==undefined&&prevS!==t.score)?' flash':'';
        html+='<div class="lb-row '+rClass+'" data-id="'+t._id+'" style="opacity:0;transform:translateY(15px)">'+
            '<div class="lb-rank">'+(rank<=3?['<i class=\'fas fa-crown\' style=\'font-size:.7rem\'></i>','2','3'][rank-1]:rank)+'</div>'+
            '<div class="lb-team"><div class="lb-badge" style="background:'+tColor(t.name)+'">'+tAbbr(t.name)+'</div><div class="lb-name">'+escHtml(t.name)+'</div></div>'+
            '<div class="lb-score-area"><div class="lb-bar-wrap"><div class="lb-bar" style="width:'+barW+'%"></div></div><div class="lb-score'+flashClass+'">'+t.score+'</div></div>'+
            '</div>';
        prevScoreMap[t._id]=t.score;
    }
    list.innerHTML=html;

    /* Animate */
    var newRows=list.querySelectorAll('.lb-row');
    for(var i=0;i<newRows.length;i++){
        (function(row,idx){
            var id=row.dataset.id;
            if(animate&&oldRects[id]){
                var newRect=row.getBoundingClientRect();
                var dy=oldRects[id].top-newRect.top;
                if(Math.abs(dy)>1){
                    row.style.transform='translateY('+dy+'px)';
                    row.style.opacity='1';
                    row.style.transition='none';
                    requestAnimationFrame(function(){
                        requestAnimationFrame(function(){
                            row.style.transition='transform .6s cubic-bezier(.16,1,.3,1)';
                            row.style.transform='translateY(0)';
                        });
                    });
                } else {
                    row.style.opacity='1';row.style.transform='translateY(0)';
                    row.style.transition='opacity .4s ease,transform .4s ease';
                }
            } else {
                var delay=animate?(idx*50):(idx*80);
                setTimeout(function(){
                    row.style.transition='opacity .5s ease,transform .5s cubic-bezier(.16,1,.3,1)';
                    row.style.opacity='1';row.style.transform='translateY(0)';
                },delay);
            }
        })(newRows[i],i);
    }
}

/* Tabs */
document.getElementById('sportTabs').addEventListener('click',function(e){
    var t=e.target.closest('.s-tab');if(!t||t.classList.contains('on'))return;
    var all=document.querySelectorAll('.s-tab');for(var i=0;i<all.length;i++)all[i].classList.remove('on');
    t.classList.add('on');curSport=t.dataset.sport;hasEverRendered=false;prevScoreMap={};attachListener();
});
document.getElementById('ageTabs').addEventListener('click',function(e){
    var t=e.target.closest('.a-tab');if(!t||t.classList.contains('on'))return;
    var all=document.querySelectorAll('.a-tab');for(var i=0;i<all.length;i++)all[i].classList.remove('on');
    t.classList.add('on');curAge=t.dataset.age;hasEverRendered=false;prevScoreMap={};attachListener();
});

/* Clock */
function tick(){var n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds(),ap=h>=12?'PM':'AM';h=h%12||12;document.getElementById('clock').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+' '+ap}
tick();setInterval(tick,1000);

/* Intro */
var introEl=document.getElementById('intro'),appEl=document.getElementById('app'),introDismissed=false;
function dismissIntro(){if(introDismissed)return;introDismissed=true;introEl.style.pointerEvents='none';void introEl.offsetWidth;introEl.classList.add('out');appEl.classList.add('show');
    /* Show skeletons until data arrives */
    if(Object.keys(teamsData).length===0) showSkeletons();
    setTimeout(function(){if(introEl.parentNode)introEl.parentNode.removeChild(introEl)},900)}
function showSkeletons(){var g=document.getElementById('lbList');var h='';for(var i=0;i<5;i++){h+='<div class="skel-row"><div class="skel-c"></div><div class="skel-sq"></div><div class="skel-bar" style="flex:1"></div><div class="skel-sc"></div></div>'}g.innerHTML=h}
document.getElementById('skipBtn').addEventListener('click',function(e){e.preventDefault();e.stopPropagation();dismissIntro()},true);
setTimeout(dismissIntro,5000);
</script>
</body>
</html>
